<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Perfume Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <h2>Admin Login</h2>
    <form id="loginForm">
      <input type="text" id="username" placeholder="Username" class="form-control mb-2" required autocomplete="username">
      <input type="password" id="password" placeholder="Token" class="form-control mb-2" required autocomplete="one-time-code">
      <button type="submit" class="btn">Login</button>
    </form>

    <div id="adminPanel" style="display: none;">
      <h3 class="mt-4">Manage Products</h3>
      <button class="btn mb-3" onclick="showAddForm()">Add Product</button>
      <div id="productsList"></div>
    </div>
  </div>

  <script src="/script.js"></script>
</body>
</html>
