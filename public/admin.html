<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Perfume Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <h2>Admin Login</h2>
    <form id="loginForm">
      <input type="text" id="username" placeholder="Admin Username" class="form-control mb-2" required autocomplete="username">
      <div class="mb-2" style="position: relative;">
        <input type="password" id="password" placeholder="Admin Password" class="form-control" required autocomplete="current-password" style="padding-right: 40px; margin-bottom: 0;">
        <button type="button" onclick="togglePassword()" id="eyeBtn" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; padding: 0; color: #666; display: flex; align-items: center; justify-content: center;" aria-label="Toggle password visibility">
          <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        </button>
      </div>
      <div id="loginError" style="color: #FF6B6B; font-size: 0.9rem; display: none; text-align: center; margin-bottom: 10px;"></div>
      <button type="submit" class="btn" style="width: 100%;">Login</button>
    </form>

    <div id="adminPanel" style="display: none;">
      <div style="display: flex; justify-content: space-between; align-items: center;" class="mt-4 mb-3">
        <h3 style="margin: 0;">Manage Products</h3>
        <button class="btn btn-secondary" onclick="logoutAdmin()" style="padding: 6px 12px; font-size: 0.9rem;">Logout</button>
      </div>
      <button class="btn mb-3" onclick="showAddForm()">Add Product</button>
      <div id="productsList"></div>
    </div>
  </div>

  <script src="/script.js"></script>
</body>
</html>
